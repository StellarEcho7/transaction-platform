version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: transaction-platform-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: transaction-platform-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  transaction-hub:
    build: ./transaction-hub
    container_name: transaction-platform-hub
    env_file:
      - .env
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SERVICE_URL: ${SERVICE_URL}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/transaction_hub
    depends_on:
      - postgres
      - redis
      - transaction-service
    ports:
      - '${HUB_PORT}:3000'

  transaction-service:
    build: ./transaction-service
    container_name: transaction-platform-service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/transaction_core
    depends_on:
      - postgres
      - redis
    ports:
      - '${SERVICE_PORT}:3000'

volumes:
  postgres_data:
  redis_data: