version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: transaction-platform-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-transaction_platform}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: transaction-platform-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  transaction-hub:
    build: ./transaction-hub
    container_name: transaction-platform-hub
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-transaction_platform}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      - postgres
      - redis
      - transaction-service
    ports:
      - '3000:3000'

  transaction-service:
    build: ./transaction-service
    container_name: transaction-platform-service
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-transaction_platform}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-10}
      WORKER_COUNT: ${WORKER_COUNT:-2}
    depends_on:
      - postgres
      - redis
    ports:
      - '3001:3001'

volumes:
  postgres_data:
  redis_data:
